services:
  # ============================================
  # PostgreSQL + pgvector
  # 镜像内置 pgvector 扩展，未来 RAG 升级直接可用
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不暴露端口给宿主机，仅容器内部访问，更安全
    # 如需远程连接调试，临时打开下面这行
    # ports:
    #   - "5432:5432"
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 2G 内存机器的资源限制
    deploy:
      resources:
        limits:
          memory: 400M

  # ============================================
  # Redis
  # 用于缓存、SSE 跨实例广播、速率限制等
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 150M

  # ============================================
  # NestJS 后端 API
  # ============================================
  api:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 30050
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_password_change_me}@postgres:5432/${POSTGRES_DB:-nexus}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net
    deploy:
      resources:
        limits:
          memory: 500M

  # ============================================
  # Nginx 反向代理 + 前端静态资源
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 前端构建产物（在宿主机上 pnpm build 出来后挂进去）
      - ./front/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - nexus-net
    deploy:
      resources:
        limits:
          memory: 100M

networks:
  nexus-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
