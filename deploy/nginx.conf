# NEXUS 生产环境 Nginx 配置
# 部署形态: nginx 容器，挂载到 /etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name _;

    # 上传文件大小限制（影响知识库文档上传）
    client_max_body_size 50m;

    # ============================================
    # 前端静态资源
    # ============================================
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存策略
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ============================================
    # API 反向代理
    # 前端请求 /api/UserAccount/login -> 后端 /UserAccount/login
    # ============================================
    location /api/ {
        # 去掉 /api/ 前缀转发到后端
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://api:30050;
        proxy_http_version 1.1;

        # 透传客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应支持（必须！否则聊天接口会卡住）
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        # 超时配置（LLM 调用可能很慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ============================================
    # SPA 路由 fallback（必须放在最后）
    # 所有非 API、非静态资源的请求都返回 index.html，让 Vue Router 接管
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_vary on;
}
